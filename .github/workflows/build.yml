name: 🔨 Build CodePocket APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

jobs:
  build:
    name: 🏗️ Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Fix gradle-wrapper.jar
        run: |
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔐 Permission gradlew
        run: chmod +x gradlew

      - name: 🎨 Generate Launcher Icons
        run: |
          pip install pillow -q
          python3 - << 'PYEOF'
          from PIL import Image, ImageDraw
          import os

          def create_icon(size, path, round_icon=False):
              img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              margin = int(size * 0.04)
              radius = size // 2 if round_icon else int(size * 0.22)
              draw.rounded_rectangle([margin, margin, size-margin, size-margin], radius=radius, fill=(30, 20, 60, 255))
              bw = max(3, int(size * 0.07))
              bx = int(size * 0.17)
              draw.rounded_rectangle([bx, int(size*0.22), bx+bw, int(size*0.78)], radius=bw//2, fill=(124, 77, 255, 255))
              draw.arc([int(size*0.28), int(size*0.18), size-int(size*0.18), int(size*0.62)], start=40, end=320, fill=(124, 77, 255, 255), width=max(2, int(size*0.07)))
              px = int(size * 0.52)
              pw = max(2, int(size * 0.06))
              draw.rounded_rectangle([px, int(size*0.20), px+pw, int(size*0.58)], radius=pw//2, fill=(80, 200, 120, 255))
              draw.arc([px, int(size*0.20), px+int(size*0.22), int(size*0.20)+int(size*0.22)], start=270, end=90, fill=(80, 200, 120, 255), width=max(2, int(size*0.06)))
              lh = max(1, int(size * 0.025))
              lx1, lx2, ly = int(size*0.17), int(size*0.83), int(size*0.70)
              draw.rounded_rectangle([lx1, ly, lx2, ly+lh], radius=lh, fill=(80, 200, 120, 180))
              draw.rounded_rectangle([lx1, ly+lh*2+1, int(lx1+(lx2-lx1)*0.6), ly+lh*3+1], radius=lh, fill=(80, 200, 120, 110))
              os.makedirs(os.path.dirname(path), exist_ok=True)
              img.save(path, 'PNG')
              print(f'icon: {path}')

          sizes = {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
          base = 'app/src/main/res'
          for folder, size in sizes.items():
              create_icon(size, f'{base}/{folder}/ic_launcher.png', False)
              create_icon(size, f'{base}/{folder}/ic_launcher_round.png', True)
          print('All icons generated!')
          PYEOF

      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📝 Rename APK
        run: |
          mkdir -p output
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE=$(date +'%Y%m%d')
          find app/build/outputs/apk/debug -name "*.apk" -exec \
            cp {} "output/CodePocket-debug-${DATE}-${SHORT_SHA}.apk" \;
          ls -lh output/

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodePocket-APK-${{ github.run_number }}
          path: output/*.apk
          retention-days: 30

      - name: 📊 Build Summary
        run: |
          echo "## ✅ Build Berhasil!" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch/Tag | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$(echo ${{ github.sha }} | cut -c1-7)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run # | \`${{ github.run_number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 APK" >> $GITHUB_STEP_SUMMARY
          ls output/ | while read f; do echo "- \`$f\`"; done >> $GITHUB_STEP_SUMMARY

  release:
    name: 🚀 GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Fix gradle-wrapper.jar
        run: |
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: 🔐 Permission gradlew
        run: chmod +x gradlew

      - name: 🎨 Generate Launcher Icons
        run: |
          pip install pillow -q
          python3 - << 'PYEOF'
          from PIL import Image, ImageDraw
          import os

          def create_icon(size, path, round_icon=False):
              img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              margin = int(size * 0.04)
              radius = size // 2 if round_icon else int(size * 0.22)
              draw.rounded_rectangle([margin, margin, size-margin, size-margin], radius=radius, fill=(30, 20, 60, 255))
              bw = max(3, int(size * 0.07))
              bx = int(size * 0.17)
              draw.rounded_rectangle([bx, int(size*0.22), bx+bw, int(size*0.78)], radius=bw//2, fill=(124, 77, 255, 255))
              draw.arc([int(size*0.28), int(size*0.18), size-int(size*0.18), int(size*0.62)], start=40, end=320, fill=(124, 77, 255, 255), width=max(2, int(size*0.07)))
              px = int(size * 0.52)
              pw = max(2, int(size * 0.06))
              draw.rounded_rectangle([px, int(size*0.20), px+pw, int(size*0.58)], radius=pw//2, fill=(80, 200, 120, 255))
              draw.arc([px, int(size*0.20), px+int(size*0.22), int(size*0.20)+int(size*0.22)], start=270, end=90, fill=(80, 200, 120, 255), width=max(2, int(size*0.06)))
              lh = max(1, int(size * 0.025))
              lx1, lx2, ly = int(size*0.17), int(size*0.83), int(size*0.70)
              draw.rounded_rectangle([lx1, ly, lx2, ly+lh], radius=lh, fill=(80, 200, 120, 180))
              draw.rounded_rectangle([lx1, ly+lh*2+1, int(lx1+(lx2-lx1)*0.6), ly+lh*3+1], radius=lh, fill=(80, 200, 120, 110))
              os.makedirs(os.path.dirname(path), exist_ok=True)
              img.save(path, 'PNG')

          sizes = {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
          base = 'app/src/main/res'
          for folder, size in sizes.items():
              create_icon(size, f'{base}/{folder}/ic_launcher.png', False)
              create_icon(size, f'{base}/{folder}/ic_launcher_round.png', True)
          print('All icons generated!')
          PYEOF

      - name: 🔨 Build APK untuk Release
        run: ./gradlew assembleDebug --no-daemon

      - name: 📝 Siapkan APK Release
        run: |
          mkdir -p release
          VERSION="${{ github.ref_name }}"
          find app/build/outputs/apk/debug -name "*.apk" -exec \
            cp {} "release/CodePocket-${VERSION}.apk" \;

      - name: 🚀 Buat GitHub Release + Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "CodePocket ${{ github.ref_name }}"
          body: |
            ## 📱 CodePocket ${{ github.ref_name }}

            ### 📥 Cara Install di Android
            1. Download file `.apk` di bawah
            2. Buka **Settings → Security** → aktifkan **Install Unknown Apps**
            3. Buka APK → Install → selesai

            ---
            🤖 Built automatically via GitHub Actions
          files: release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
