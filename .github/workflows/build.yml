name: 🔨 Build CodePocket APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: Build APK → upload sebagai artifact
  # Jalan otomatis setiap kamu git push dari Termux
  # ═══════════════════════════════════════════════════════════════
  build:
    name: 🏗️ Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Fix: Download gradle-wrapper.jar yang valid dari GitHub resmi
      # Ini diperlukan karena jar di repo adalah placeholder
      - name: 🔧 Fix gradle-wrapper.jar
        run: |
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "gradle-wrapper.jar size: $(du -sh gradle/wrapper/gradle-wrapper.jar)"

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔐 Permission gradlew
        run: chmod +x gradlew

      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📝 Rename APK
        run: |
          mkdir -p output
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE=$(date +'%Y%m%d')
          find app/build/outputs/apk/debug -name "*.apk" -exec \
            cp {} "output/CodePocket-debug-${DATE}-${SHORT_SHA}.apk" \;
          echo "--- APK Output ---"
          ls -lh output/

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodePocket-APK-${{ github.run_number }}
          path: output/*.apk
          retention-days: 30

      - name: 📊 Build Summary
        run: |
          echo "## ✅ Build Berhasil!" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch/Tag | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$(echo ${{ github.sha }} | cut -c1-7)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run # | \`${{ github.run_number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 APK" >> $GITHUB_STEP_SUMMARY
          ls output/ | while read f; do echo "- \`$f\`"; done >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: Auto GitHub Release
  # Jalan HANYA saat push tag dari Termux:
  #   git tag v1.0.0
  #   git push origin v1.0.0
  # ═══════════════════════════════════════════════════════════════
  release:
    name: 🚀 GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Fix gradle-wrapper.jar
        run: |
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: 🔐 Permission gradlew
        run: chmod +x gradlew

      - name: 🔨 Build APK untuk Release
        run: ./gradlew assembleDebug --no-daemon

      - name: 📝 Siapkan APK Release
        run: |
          mkdir -p release
          VERSION="${{ github.ref_name }}"
          find app/build/outputs/apk/debug -name "*.apk" -exec \
            cp {} "release/CodePocket-${VERSION}.apk" \;

      - name: 🚀 Buat GitHub Release + Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "CodePocket ${{ github.ref_name }}"
          body: |
            ## 📱 CodePocket ${{ github.ref_name }}

            ### 📥 Cara Install di Android
            1. Download file `.apk` di bawah
            2. Buka **Settings → Security** → aktifkan **Install Unknown Apps**
            3. Buka APK → Install → selesai

            ---
            🤖 Built automatically via GitHub Actions
          files: release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
